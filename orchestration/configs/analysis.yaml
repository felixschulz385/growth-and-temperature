        formula: "avhrr_median ~ log(viirs_annual + 0.01) | pixel_id + year | 0 | subdivision"

      ## HDI split

      modis_ntlharm_twfe_hdi:
        description: "Two-way fixed effects (TWFE) regression model estimating the heterogeneous effects of two-way demeaned harmonized nighttime lights (NTL) interacted with Human Development Index (HDI) categories (Medium, High, Very High) on median MODIS land surface temperature at 500m resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_500m.parquet"
        formula: "modis_median ~ ntl_harm_twoway_demeaned:HDI_ME + ntl_harm_twoway_demeaned:HDI_HI + ntl_harm_twoway_demeaned:HDI_VH | pixel_id + country*year | 0 | subdivision"

      modis_viirs_twfe_hdi:
        description: "Two-way fixed effects (TWFE) regression model estimating the heterogeneous effects of two-way demeaned annual VIIRS nighttime lights interacted with Human Development Index (HDI) categories (Medium, High, Very High) on median MODIS land surface temperature at 500m resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_500m.parquet"
        formula: "modis_median ~ viirs_annual_twoway_demeaned:HDI_ME + viirs_annual_twoway_demeaned:HDI_HI + viirs_annual_twoway_demeaned:HDI_VH | pixel_id + country*year | 0 | subdivision"

      # IV
      
      ## Regional Favoritism
      
      ### H&R Replication

      #### TWFE

      ##### AVHRR

      ###### HARM

      avhrr_logntlharm_regfav_twfe_replicate:
        description: "Instrumental variables (IV) two-way fixed effects (TWFE) regression model replicating Hodler & Raschky (2014) by estimating the effect of logged harmonized nighttime lights (log(NTL + 0.01)) on median AVHRR land surface temperature at 5km resolution using regional favoritism as an instrument, with pixel and country-year fixed effects, subset to Hodler & Raschky (2014) research areas and years before 2010, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_5km.parquet"
        formula: "avhrr_median ~ 1 | pixel_id + country*year | log(ntl_harm + 0.01) (reg_fav) | subdivision"
        subset: "research_hodler_raschky_2014"
        query: "year < 2010"

