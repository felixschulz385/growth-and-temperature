        description: "Unit fixed effects (UFE) regression model estimating the effect of logged annual VIIRS nighttime lights (log(VIIRS + 0.01)) on median AVHRR land surface temperature at 5km resolution, with pixel-level fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_5km.parquet"
        formula: "avhrr_median ~ log(viirs_annual + 0.01) | pixel_id | 0 | subdivision"

      # TWFE

      ## MODIS

      ### HARM

      modis_ntlharm_twfe:
        description: "Two-way fixed effects (TWFE) regression model estimating the effect of harmonized nighttime lights (NTL) on median MODIS land surface temperature at 1km resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_1km.parquet"
        formula: "modis_median ~ ntl_harm | pixel_id + country*year | 0 | subdivision"

      modis_logntlharm_twfe:
        description: "Two-way fixed effects (TWFE) regression model estimating the effect of logged harmonized nighttime lights (log(NTL + 0.01)) on median MODIS land surface temperature at 1km resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_1km.parquet"
        formula: "modis_median ~ log(ntl_harm + 0.01) | pixel_id + country*year | 0 | subdivision"

      ### VIIRS
        
      modis_viirs_twfe:
        description: "Two-way fixed effects (TWFE) regression model estimating the effect of annual VIIRS nighttime lights on median MODIS land surface temperature at 500m resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_500m.parquet"
        formula: "modis_median ~ viirs_annual | pixel_id + country*year | 0 | subdivision"

      modis_logviirs_twfe:
        description: "Two-way fixed effects (TWFE) regression model estimating the effect of logged annual VIIRS nighttime lights (log(VIIRS + 0.01)) on median MODIS land surface temperature at 500m resolution, with pixel and country-year fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_500m.parquet"
        formula: "modis_median ~ log(viirs_annual + 0.01) | pixel_id + country*year | 0 | subdivision"

      ## MODIS MEAN

