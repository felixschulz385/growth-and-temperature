      modis_ntlharm_ufe:
        description: "Unit fixed effects (UFE) regression model estimating the effect of harmonized nighttime lights (NTL) on median MODIS land surface temperature at 1km resolution, with pixel-level fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/_1km.parquet"
