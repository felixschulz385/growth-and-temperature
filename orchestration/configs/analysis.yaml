# Analysis configuration for GNT project

# Metadata for configuration organization
_metadata:
  structure: |
    Specifications are organized into the following groups:
    1. Pooled Models - No fixed effects
    2. UFE Models - Unit fixed effects (pixel-level)
    3. TWFE Models - Two-way fixed effects (pixel + country*year)
    4. TWFE-Year Models - Two-way fixed effects (pixel + year only)
    5. Subsample Analysis - Regional/development stratification
    6. IV Models - Instrumental variable specifications
    7. Reduced Form - Direct instrument effects
    8. Debug - Testing configurations
    
  sorting: "Alphabetical within each group"
  satellite_sensors: ["MODIS", "AVHRR"]
  light_sources: ["harmonized (ntl_harm)", "VIIRS (viirs_annual)"]
  temperature_metrics: ["median", "mean", "rollmax3", "gt30C"]

# Analysis types and configurations
analyses:
  
  duckreg:

    description: "Compressed regression using DuckDB"

    # Default Settings
    defaults:
      se_method: "analytical"
      fitter: "duckdb"
      n_bootstraps: 0
      seed: 42
      fe_method: "mundlak"
      round_strata: 5
      n_jobs: 4  # Number of parallel jobs for bootstrap
      duckdb_kwargs:
        temp_directory: "${WD}/scratch_nobackup/${SLURM_JOB_ID}"
        memory_limit: "96GB"
        max_temp_directory_size: "512GB"
        enable_progress_bar: "true"
    # Predefined model specifications
    specifications:

      # =========================================================================
      # POOLED MODELS - No fixed effects, clustered by subdivision
      # =========================================================================

      avhrr_logntlharm_pooled:
        description: "Pooled regression model estimating the effect of logged harmonized nighttime lights (log(NTL + 0.01)) on median AVHRR land surface temperature at 5km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/5km.parquet"
        formula: "avhrr_median ~ log(ntl_harm + 0.01) | 0 | 0 | subdivision"

      avhrr_logviirs_pooled:
        description: "Pooled regression model estimating the effect of logged annual VIIRS nighttime lights (log(VIIRS + 0.01)) on median AVHRR land surface temperature at 5km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/5km.parquet"
        formula: "avhrr_median ~ log(viirs_annual + 0.01) | 0 | 0 | subdivision"

      avhrr_ntlharm_pooled:
        description: "Pooled regression model estimating the effect of harmonized nighttime lights (NTL) on median AVHRR land surface temperature at 5km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/5km.parquet"
        formula: "avhrr_median ~ ntl_harm | 0 | 0 | subdivision"

      avhrr_viirs_pooled:
        description: "Pooled regression model estimating the effect of annual VIIRS nighttime lights on median AVHRR land surface temperature at 5km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/5km.parquet"
        formula: "avhrr_median ~ viirs_annual | 0 | 0 | subdivision"

      modis_logntlharm_pooled:
        description: "Pooled regression model estimating the effect of logged harmonized nighttime lights (log(NTL + 0.01)) on median MODIS land surface temperature at 1km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/1km.parquet"
        formula: "modis_median ~ log(ntl_harm + 0.01) | 0 | 0 | subdivision"

      modis_logviirs_pooled:
        description: "Pooled regression model estimating the effect of logged annual VIIRS nighttime lights (log(VIIRS + 0.01)) on median MODIS land surface temperature at 1km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/1km.parquet"
        formula: "modis_median ~ log(viirs_annual + 0.01) | 0 | 0 | subdivision"

      modis_ntlharm_pooled:
        description: "Pooled regression model estimating the effect of harmonized nighttime lights (NTL) on median MODIS land surface temperature at 1km resolution, without fixed effects, clustered by subdivision."
        data_source: "${WD}/data_nobackup/assembled/1km.parquet"
        formula: "modis_median ~ ntl_harm | 0 | 0 | subdivision"

      modis_viirs_pooled:
        description: "Pooled regression model estimating the effect of annual VIIRS nighttime lights on median MODIS land surface temperature at 500m resolution, without fixed effects, clustered by subdivision."
