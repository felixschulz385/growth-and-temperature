        Spatial Extent: "H&R"
        Temporal Extent: ["1992-2009", "1992-2009", "2000-2009", "2013-2020", "1992-2009", "2000-2009", "2013-2020"]
    notes:
      - "Dependent variable is nighttime lights (not logged)"
      - "Models use regional favoritism as instrument with Mundlak fixed effects estimation"
      - "PX: Pixel fixed effects; CY: Country×Year fixed effects; YR: Year fixed effects"
