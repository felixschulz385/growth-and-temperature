        Clustering: "ADM2"
      - Resolution: ["1km", "500m", "1km", "500m", "1km", "500m"]
        Spatial Extent: "World"
        Temporal Extent: ["2000-2020", "2012-2020", "2000-2020", "2012-2020", "2000-2020", "2012-2020"]
      - Dependent Variable: ["Mean Temp", "Mean Temp", "Roll Max Temp", "Roll Max Temp", ">30°C Prop", ">30°C Prop"]
    notes:
