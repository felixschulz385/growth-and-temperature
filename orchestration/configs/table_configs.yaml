  regfav:
    model_paths:
      - name: "avhrr_logntlharm_regfav_twfe_replicate"
        analysis_type: "duckreg"
      - name: "modis_logntlharm_regfav_twfe_replicate"
        analysis_type: "duckreg"
      - name: "modis_logviirs_regfav_twfe_replicate"
        analysis_type: "duckreg"
      - name: "avhrr_logntlharm_regfav_twyfe_replicate"
        analysis_type: "duckreg"
      - name: "modis_logntlharm_regfav_twyfe_replicate"
        analysis_type: "duckreg"
      - name: "modis_logviirs_regfav_twyfe_replicate"
        analysis_type: "duckreg"
    model_names: ["(RF.HR.5km)", "(RF.HR.1km)", "(RF.HR.500m)", "(RF.HR.5km.2YFE)", "(RF.HR.1km.2YFE)", "(RF.HR.500m.2YFE)"]
    caption: "Instrumental Variable Estimates of Log Nighttime Lights Effects on Land Surface Temperature Using Regional Favoritism: Replication of Hodler & Raschky (2014) at Multiple Resolutions"
    select_coefs:
      fitted_log_ntl_harm_0_01: "$\\hat{\\log(\\text{HARM} + 0.01)}$"
      fitted_log_viirs_annual_0_01: "$\\hat{\\log(\\text{VIIRS} + 0.01)}$"
    # Optionally select specific instruments to display in first stage
    select_instruments:
      reg_fav: "Leader's Birthplace"
    show_first_stage: "full"
    show_stats:
      - n_observations
      - n_compressed_rows
    custom_rows:
      - Nighttime Lights: ["DMSP", "DMSP", "VIIRS", "DMSP", "DMSP", "VIIRS"]  
        Fixed Effects: ["PX+CY", "PX+CY", "PX+CY", "PX+YR", "PX+YR", "PX+YR"]
        Clustering: "ADM2"
      - Resolution: ["5km", "1km", "500m", "5km", "1km", "500m"]
        Spatial Extent: "H&R"
        Temporal Extent: ["1992-2009", "2000-2009", "2013-2020", "1992-2009", "2000-2009", "2013-2020"]
    notes:
      - "Dependent variable is log(nighttime lights + 0.01)"
      - "Models use Mundlak fixed effects estimation with clustered standard errors"
      - "PX: Pixel fixed effects; CY: Country×Year fixed effects; YR: Year fixed effects"
    include_ci: false
    decimals: 3
    output_formats:
      - latex

